name: Crystal CI

on:
  - push
  - pull_request

jobs:
  build:

    runs-on: ubuntu-latest

    container:
      image: crystallang/crystal

    services:
      redis:
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 60

    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: shards install
    - name: Run tests
      run: crystal spec
      env:
        REDIS_URL: redis://redis/
